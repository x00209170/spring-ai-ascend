# Module metadata for agent-runtime.
# Required by CLAUDE.md Rule R-C sub-clause .b (Independent Module Evolution).
# Authority: ADR-0066 + ADR-0072 (Engine Envelope + Strict Matching) + ADR-0088 (agent-runtime-core dissolution).
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-runtime
kind: domain             # platform | domain | starter | bom | sample
version: 0.0.1-SNAPSHOT
semver_compatibility: experimental
description: "Run-owning runtime SDK developed against to drive Agent instances built on heterogeneous agent frameworks. Owns the neutral execution core (RunCoordinator + the AgentDriver / OutputConverter SPI + the RunEvent model in runtime.engine and runtime.engine.spi; framework adapters in runtime.engine.adapters; AgentDriverRegistry in runtime.engine.registry), engine dispatch (runtime.dispatch), Run lifecycle, session, task-control, internal event queue, access (A2A), and the bootable runtime application."
architecture_doc: architecture/docs/L1/agent-runtime/README.md
dfx_doc: docs/dfx/agent-runtime.yaml
spi_packages:
  # Neutral framework-driver SPI (AgentDriver + AbstractAgentDriver + OutputConverter) —
  # the single I/O-boundary seam each framework adapter implements; framework-native
  # tool / memory / middleware stay inside the adapter.
  - com.huawei.ascend.runtime.engine.spi
allowed_dependencies:
  - agent-bus              # neutral bus.spi.engine / bus.spi.s2c / bus.spi.ingress surface (consumed via agent-bus)
forbidden_dependencies:
  - agent-service          # engine is upstream of agent-service; reverse direction forbidden
deployment_plane: compute_control   # Rule R-I / P-I — engine runs in-process with the runtime kernel
