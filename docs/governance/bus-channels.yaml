# Three-track bus channel declaration (Rule 35).
#
# The L0 ironclad rule (LucioIT W1 §6.4) requires that cross-service internal
# communication is mandatorily sliced into three independent physical channels:
#   - control: out-of-band, highest priority (PAUSE / KILL / cancel intents)
#   - data:    in-band, heavy-load (text-to-video file streams, payload bodies)
#   - rhythm:  heartbeat / liveness pulses, taken over by bus-level Tick Engine
#
# The three tracks must be absolutely isolated to prevent any single type of
# network congestion from causing global paralysis.
#
# Authority: ADR-0069 (L0 ironclad rules) + LucioIT W1 L0 draft §6.4.
# Enforced by gate rule 45 (bus_channels_three_track_present).
# Consumed by gate/build_architecture_graph.py to emit (concept Three-Track
# Channel Isolation) -> (channel) -> (physical_channel) edges.

version: 1
generated_at: 2026-05-15

# Post-rc2 status label (gate Rule 62 `contract_yaml_declares_status`): this
# file ships the channel SCHEMA + logical channel declarations. Physical
# transport implementation (priority queues / Kafka topics / Tick Engine) is
# deferred to W2 per CLAUDE-deferred.md 35.b. The `physical_channel:` strings
# below (e.g. `in_memory_priority_queue_w0`) are in-process stubs at W0;
# they do NOT yet provide physical isolation between control / data / rhythm
# traffic.
status: schema_shipped

channels:
  - id: control
    priority: highest
    physical_channel: in_memory_priority_queue_w0   # W0: in-memory priority queue; W2: dedicated Kafka topic with idempotent control headers
    delivery_guarantee: at_least_once
    isolation: out_of_band
    intents:
      - PAUSE
      - KILL
      - CANCEL
      - RESUME
      - DEADLINE_SHIFT
    realised_by:
      module_l0: agent-bus
      reactor_module: agent-bus-java          # scaffold lands in W1.x Phase 2
      stub_implementation: in-process channel; agent-bus-java module not yet shipped at W1
    deferred_until_wave: W2

  - id: data
    priority: normal
    physical_channel: in_memory_unbounded_queue_w0  # W0: in-memory; W2: dedicated Kafka topic, body bytes go to object storage with reference passed inline
    delivery_guarantee: at_least_once
    isolation: in_band_heavy
    payload_size_cap_bytes: 16384                   # 16 KiB inline cap (matches §4 #13 / E11); larger payloads use envelope+ref pattern (PayloadCodec SPI, deferred Rule 22)
    realised_by:
      module_l0: agent-bus
      reactor_module: agent-bus-java
      stub_implementation: in-process channel
    deferred_until_wave: W2

  - id: rhythm
    priority: low
    physical_channel: in_memory_tick_w0             # W0: scheduler thread tick; W2: bus-level Tick Engine emitting periodic bus-wide pulse
    delivery_guarantee: at_most_once                # heartbeat is naturally lossy; one missed pulse triggers re-evaluation, not failure
    isolation: out_of_band
    period_millis: 1000                              # 1 Hz baseline; per-tenant override allowed
    realised_by:
      module_l0: agent-bus
      reactor_module: agent-bus-java
      stub_implementation: scheduled executor
    deferred_until_wave: W2

# At W1 entry the agent-bus-java reactor module is a scaffold (Phase 2 of W1.x
# wave). The three channels are declared here so the contract surface is
# enumerable and gate-checkable today; physical implementation lands W2 per
# CLAUDE-deferred.md 35.b.

# ---------------------------------------------------------------------------
# Logical mappings (W2.x Phase 3, ADR-0074 / S2C Capability Callback Protocol)
#
# S2C callbacks ride the existing three physical channels via the following
# logical mappings -- no new physical channel is added. Cross-rule resolution
# documented in docs/logs/reviews/2026-05-16-engine-contract-structural-response.en.md §5.1.
# ---------------------------------------------------------------------------
logical_mappings:
  - id: s2c.callback.request
    routes_on_channel: control
    rationale: |
      The server-to-client request is a high-priority out-of-band intent.
      Riding the control channel guarantees it bypasses any congestion on
      the data channel (e.g., large model-call payloads in flight).
    authority: ADR-0074

  - id: s2c.callback.response
    routes_on_channel: data
    rationale: |
      The client-to-server response carries a payload of arbitrary capability-
      specific size. Inherits the 16 KiB inline-payload cap on the data
      channel (ARCHITECTURE.md §4 #13); larger responses use the
      envelope+ref pattern via PayloadCodec SPI (Rule 22, deferred).
    authority: ADR-0074

  - id: s2c.callback.heartbeat
    routes_on_channel: rhythm
    rationale: |
      In-flight client callbacks emit liveness pulses on the rhythm channel
      so the server-side suspension monitor can detect a hung client and
      trigger SuspendReason.AwaitClientCallback timeout enforcement
      (W2 wiring; W2.x ships the schema declaration only).
    authority: ADR-0074
