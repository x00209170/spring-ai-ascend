# Principle → Rule coverage (machine form).
#
# Authority: ADR-0064 (Layer-0 governing principles) + ADR-0068 (Layered 4+1 + Graph).
# Companion human-readable form: docs/governance/principle-coverage.md.
# Consumed by gate/build_architecture_graph.sh to emit principle→rule edges.

version: 1
generated_at: 2026-05-14

principles:
  - id: P-A
    name: "Business/Platform Decoupling + Developer Self-Service"
    motivation: |
      Business code and platform code are decoupled. Customization-by-source-patch
      into platform internals is forbidden. All architecture and solution design
      must be developer-friendly: configuration-driven extension, debug-friendly
      telemetry, and self-service closure (a developer can build, run, and test
      an agent end-to-end against the platform without platform-team intervention).
    operationalised_by_rules:
      - Rule-6
      - Rule-29
    operationalised_by_legacy_principles:
      - P2

  - id: P-B
    name: "Four Competitive Pillars (Performance / Cost / Onboarding / Governance)"
    motivation: |
      Platform competitiveness rests on four continuously-improvable dimensions —
      Performance (latency, throughput), Cost (per-call + infra), Developer
      Onboarding (time-to-first-agent + surface complexity), Governance (tenant
      isolation, audit, eval, safety). Each dimension must have a published
      baseline that future releases can be measured against.
    operationalised_by_rules:
      - Rule-9
      - Rule-21
      - Rule-30
    deferred_operationalisers:
      - Rule-18   # eval — deferred W4

  - id: P-C
    name: "Code-as-Everything, Rapid Evolution, Independent Modules"
    motivation: |
      Every architectural constraint is code. Modules evolve independently — each
      builds, tests, and upgrades on its own, with high cohesion and low
      coupling. Production-environment upgrades are lightweight
      (BoM + starter pattern + semver compatibility).
    operationalised_by_rules:
      - Rule-10
      - Rule-25
      - Rule-28
      - Rule-31
      - Rule-33   # NEW (ADR-0068)
      - Rule-34   # NEW (ADR-0068)

  - id: P-D
    name: "SPI-Aligned, DFX-Explicit, Spec-Driven, TCK-Tested"
    motivation: |
      Every domain module ships an SPI; every platform/domain module declares
      its Design-for-X posture (releasability, resilience, availability,
      vulnerability, observability); contracts precede implementation;
      alternative implementations must pass a TCK to be conformant.
    operationalised_by_rules:
      - Rule-4
      - Rule-32
    deferred_operationalisers:
      - Rule-22   # PayloadCodec — deferred

  # ---------------------------------------------------------------------
  # L0 ironclad-rule principles (W1.x absorption of LucioIT L0 §6/§7)
  # Authority: ADR-0069 (L0 ironclad rules)
  # ---------------------------------------------------------------------

  - id: P-E
    name: "Multi-Track Bus Physical Channel Isolation"
    motivation: |
      Cross-service internal communication is sliced into three physically
      isolated channels — control (out-of-band PAUSE/KILL/CANCEL intents,
      highest priority), data (in-band heavy-load payload bodies), and
      rhythm (heartbeat/liveness pulses). No congestion on one channel can
      paralyse another. (LucioIT W1 §6.4.)
    operationalised_by_rules:
      - Rule-35

  - id: P-F
    name: "Cursor Flow & Asynchronous Client Boundary"
    motivation: |
      The Client → Runtime boundary is non-blocking. Long-horizon task
      submissions return a Task Cursor immediately; clients consume process
      state via SSE and intermediate-result checkpoints via Webhook. No
      long-poll, no synchronous blocking. (LucioIT W1 §6.1.)
    operationalised_by_rules:
      - Rule-36

  - id: P-G
    name: "Absolute Non-Blocking I/O"
    motivation: |
      External I/O calls (model gateway, vector DB, sandbox dispatch) MUST
      use Reactive or Virtual Threads. The OS-level worker thread MUST be
      released during the I/O wait so other Agents can proceed. (LucioIT W1 §6.3.)
    operationalised_by_rules:
      - Rule-37
    deferred_operationalisers:
      - Rule-37.c   # agent-service service.platform JdbcTemplate migration to R2DBC — W2 (was agent-platform pre-Phase-C / ADR-0078)

  - id: P-H
    name: "Chronos Hydration"
    motivation: |
      Long-horizon waits in business code MUST be declarative suspension
      (SuspendSignal), not physical thread sleep. The sleeping process
      self-destructs and re-hydrates on the bus wake-pulse. (LucioIT W1 §6.4.)
    operationalised_by_rules:
      - Rule-38

  - id: P-I
    name: "Five-Plane Distributed Topology"
    motivation: |
      Production deployment is divided into five physically isolated planes —
      Edge Access (Client SDK), Compute & Control (Runtime + Engine), Bus &
      State Hub (Bus + Middleware persistence), Sandbox Execution (untrusted
      code), and Evolution (Python ML). Workloads with different
      characteristics MUST NOT share infrastructure. (LucioIT W1 §7.1.)
    operationalised_by_rules:
      - Rule-39

  - id: P-J
    name: "Storage-Engine Tenant Isolation"
    motivation: |
      Tenant isolation lives at the storage engine, not the application code.
      Every tenant-scoped table MUST enable Row-Level Security policies; even
      a fully-compromised application tier cannot leak across tenants.
      (LucioIT W1 §7.2.)
    operationalised_by_rules:
      - Rule-40
    deferred_operationalisers:
      - Rule-40.b   # V1/V2 grandfathered RLS retrofit — W2

  - id: P-K
    name: "Skill-Dimensional Resource Arbitration"
    motivation: |
      A 2D defence net — Tenant Quota × Global Skill Capacity — protects the
      cluster. When a skill capacity pool fills, the scheduler suspends only
      the Agent processes blocked on that specific skill, freeing OS threads
      for unrelated work. (LucioIT W1 §7.3.)
    operationalised_by_rules:
      - Rule-41
    deferred_operationalisers:
      - Rule-41.b   # ResilienceContract.resolve runtime enforcement — W1.x Phase 6

  - id: P-L
    name: "Sandbox Permission Subsumption"
    motivation: |
      Logical authorizations issued by the bus MUST 1:1 map to physical
      sandbox restrictions (outbound IP whitelist, CPU cap, filesystem access).
      A logical grant cannot exceed what the physical sandbox enforces;
      otherwise the runtime authority is fictional. (LucioIT W1 §7.4.)
    operationalised_by_rules:
      - Rule-42
    deferred_operationalisers:
      - Rule-42.b   # SandboxExecutor runtime subsumption check — W2

  # ---------------------------------------------------------------------
  # W2.x Engine Contract Structural Wave — heterogeneous engine contract
  # Authority: ADR-0071 (umbrella) + ADR-0072..0075 (substantive children)
  # Driver review: 2026-05-15 L0 proposal (Runtime-Engine Contract for
  # Heterogeneous Agent Execution).
  # ---------------------------------------------------------------------

  - id: P-M
    name: "Heterogeneous Engine Contract & Server-Sovereign Boundary"
    motivation: |
      The platform supports heterogeneous execution engines through a
      structured contract surface: a configuration envelope governs
      registration / routing / observability, strict matching prevents
      silent reinterpretation of engine-specific payloads, runtime-owned
      middleware attaches via engine-declared lifecycle hooks, server-to-
      client capability invocation is an explicit asynchronous protocol
      bound to the suspend/resume loop, and the evolution mechanism manages
      only server-controlled execution scope by default. (2026-05-15
      L0 proposal §3-§7.)
    operationalised_by_rules:
      - Rule-43   # Engine Envelope Single Authority
      - Rule-44   # Strict Engine Matching
      - Rule-45   # Runtime-Owned Middleware via Engine Hooks
      - Rule-46   # S2C Callback Envelope + Lifecycle Bound
      - Rule-47   # Evolution Scope Default Boundary
    cross_cutting_invariant:
      rule: Rule-48   # Schema-First Domain Contracts
      description: |
        Every contract introduced under P-M MUST ship as yaml schema first,
        Java type that validates against the schema second, and runtime
        self-validation third. Rule 48 makes this gate-enforced beyond the
        wave so future domain contracts inherit the discipline.

