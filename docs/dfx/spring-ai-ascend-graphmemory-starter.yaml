# DFX (Design-for-X) declaration for the spring-ai-ascend-graphmemory-starter module.
#
# Authority: ADR-0067. The DFX yaml is OPTIONAL for `kind: starter` modules
# under CLAUDE.md Rule 32 (which mandates DFX for `kind: platform` and
# `kind: domain`). Published here for parity and to anchor the W1 Graphiti
# reference adapter contract.

module: spring-ai-ascend-graphmemory-starter
kind: starter
version: 1
generated_at: 2026-05-14

releasability:
  artifact_coords: "io.github.springai-ascend:spring-ai-ascend-graphmemory-starter"
  semver_policy: "0.x — auto-configuration is disabled by default at W0"
  deprecation_window: "starter-level — one minor version with @Deprecated; underlying GraphMemoryRepository SPI follows agent-service semver (post-Phase-C; pre-Phase-C this was agent-runtime per ADR-0078)"
  packaging: "spring-boot-starter; conditional auto-config gated on property + classpath checks"

resilience:
  fallback_paths: ["no bean registered if disabled — caller decides how to handle absence"]
  posture_aware_defaults: "no bean registered in dev/research/prod at W0; W1 Graphiti REST adapter must add a posture-aware fallback per ADR-0034"
  cancellation_contract: "delegated to GraphMemoryRepository SPI (W1)"

availability:
  health_endpoints: []
  readiness_signal: "deferred — depends on W1 Graphiti adapter"
  startup_failure_modes: ["W0: auto-config is disabled; no startup behaviour to fail-close on"]

vulnerability:
  scan_tooling: "starter dependencies pinned via BoM; CVE scan deferred per CLAUDE-deferred.md 32.d"
  tenant_isolation: "MemoryMetadata schema (§4 #31) carries tenantId on every persisted memory record"
  spi_purity: "GraphMemoryRepository SPI at agent-service/src/main/java/com/huawei/ascend/service/runtime/memory/spi/ imports only java.* (E3); canonical owner pinned by ADR-0082."

observability:
  metric_namespace: "springai_ascend_graphmemory_*"
  trace_carrier: "inherits TraceContext from the calling Run (W1)"
  hook_emission_path: "memory writes flow through HookChain at W2"
