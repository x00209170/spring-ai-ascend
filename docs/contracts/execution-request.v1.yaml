# ExecutionRequest carrier consumed by ExecutorAdapter.execute, version 1.
#
# Authority: ADR-0155.
# Wave: design_only.


schema: execution-request/v1
authority: ADR-0155
status: design_only
runtime_enforced: false

fields:
  runId:
    type: string
    required: true
  agentSpecRef:
    type: string
    required: true
    description: "Reference to the immutable AgentSpec resolved by EDE-05."
  configSnapshotRef:
    type: string
    required: true
  sessionContextRef:
    type: object
    required: true
    description: "(sessionId, version) tuple; adapter MUST read STM-04 only through PlatformMemoryProvider."
  startCheckpointRef:
    type: string
    required: false
    description: "If non-null, resume from this checkpoint instead of cold-starting."
  inputPayloadRef:
    type: string
    required: true
  capabilityHints:
    type: object
    required: false
