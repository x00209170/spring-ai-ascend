# Rule Namespace Ratchet — old `Rule N` integer → new prefix-namespace ID map.
#
# Authority: ADR-0086 (Rule Namespace Ratchet) — to be accepted at the atomic-ratchet PR.
# Generated: 2026-05-19 from Authority-Surface Cleanup migration plan.
#
# Schema:
#   - old_rule:           integer (1..100, plus deferred rule subclauses by string id)
#   - new_id:             string (D-<n> | R-<letter> | G-<n> | M-<n>)
#   - sub_clause:         optional ".<letter>" sub-clause suffix (only when multiple
#                         old rules merge into one new rule)
#   - principle_ref:      optional principle backref for R-* rules
#   - status:             one of {active | deferred | retired}
#   - enforcer_rows_preserved: list of E<n> enforcer ids that survive the migration
#                         (used by the Wave 5 coverage parity audit)
#   - rationale:          one-line reason for the new placement
#
# Reading the map:
#   * R-A through R-M = one rule per L0 governing principle P-A..P-M.
#   * D-* = daily engineering discipline (root-cause, simplicity, tests, async).
#   * G-* = cross-cutting governance (graph truth, doc truth, kernel coherence, gate self-consistency, byte budget, linux-first dev).
#   * M-* = module hygiene (skeleton; schema-first contracts).
#   * Sub-clauses (.a, .b, ...) keep section-per-assertion granularity inside merged rules;
#     gate/check_architecture_sync.sh continues to emit one `# Rule <new-id>.<letter>` header
#     per assertion so per-rule duration tracking and enforcer attribution stay intact.

