    - "bash gate/check_architecture_sync.sh → GATE: PASS with 112 PASS lines (Linux/WSL per Rule 74)."
    - "bash gate/check_parallel.sh → parallel_summary: executed 112 rules; serial source defined 112 rules."
    - "bash gate/test_architecture_sync_gate.sh → Tests passed: 172/172 (or 169/172 if pre-existing rule_e2_ndjson_* failures remain — those are unrelated to rc11; not regressed)."
    - "python gate/build_architecture_graph.py → idempotent re-run (Rule 42)."
    - "./mvnw -B -ntp verify → 371 Maven tests GREEN (no production code changes)."
  gate:
    - "Rule 91 (baseline_metric_matches_executable_manifest) PASSES with active_gate_checks=112 + enforcer_rows=142."
    - "Rule 94 (active_corpus_deleted_module_name_truth) PASSES under widened scan."
    - "Rule 98 (broad_corpus_deleted_module_name_truth) PASSES under widened scan."
    - "Rule 99 (kernel_terminal_verb_vs_shipped_decision_check) PASSES — no kernels overclaim."
    - "Rule 100 (kernel_implementation_disjunction_truth) PASSES — Rule 96 kernel + card both carry EITHER/OR wording."
    - "Rule 63 (release_note_retracted_tag_qualified) PASSES — every rc10 reference carries (retracted)."
  manual:
    - "grep -nE 'rc10' README.md → every active reference carries (retracted)."
    - "Open docs/reviews/2026-05-19-l0-rc10-post-corrective-architecture-review.en.md side-by-side with docs/reviews/2026-05-19-l0-rc10-post-corrective-architecture-review-response.en.md — every cited evidence row in the review has a closure row in the response."
  ci:
    - "Merge PR rc11/kernel-truth-and-shadow-corpus-precision to main; verify Maven build + Quickstart smoke green; tag v2.0.0-rc11; verify CI run on tag is green."

enforcer_rows:
