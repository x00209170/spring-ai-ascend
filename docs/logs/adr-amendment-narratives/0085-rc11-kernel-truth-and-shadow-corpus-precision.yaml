id: ADR-0085
title: "rc11 Kernel-Truth + Shadow-Corpus-Precision + rc10 Retraction"
status: accepted
date: 2026-05-19
level: L0
view: process
freeze_id: null

supersedes:
  - v2.0.0-rc10  # retracted by this ADR
extends:
  - ADR-0083  # rc9 corpus-truth + CI-acceptance
  - ADR-0084  # rc10 corpus-truth + prevention-widening (retracted alongside rc10 tag)
relates_to:
  - ADR-0070  # Cursor Flow + Skill Capacity runtime
  - ADR-0078  # Phase-C consolidation (agent-platform + agent-runtime → agent-service)
  - ADR-0079  # Engine extraction + agent-runtime-core kernel module

decision_one_liner: |
  Close the four findings of the rc10 post-corrective architecture review
  (Codex, 2026-05-19) using the same categorize→sweep→batch-fix→prevention
  methodology that rc10 itself applied to rc8. Per user election, this wave
  ALSO (a) fully retracts the v2.0.0-rc10 tag (added to
  `docs/governance/retracted-tags.txt`; release-note title + frontmatter carry
  `(retracted)` qualifier per Rule 63), and (b) widens Rule 94's implementation
  to match its kernel ("every active .md/.yaml/.java" minus an explicit
  exemption list).

triggering_inputs:
  external_reviews:
    - "docs/reviews/2026-05-19-l0-rc10-post-corrective-architecture-review.en.md (Codex, 2026-05-19) — found 4 contract/prevention-rule precision defects (P1-1, P1-2, P1-3, P2-1) blocking a clean L0 completion release note."
  user_directives:
    - "Retract rc10 entirely (vs. carry rc11 correction markers) — provides cleaner audit trail."
    - "Widen Rule 94 impl to match kernel in rc11 (vs. defer or narrow kernel) — closes the reviewer-noted kernel/impl drift in the same wave."

defect_taxonomy:
  - family_id: "J-α"
    name: "Rule kernel overclaims shipped runtime behaviour"
    cited_finding: "rc10 review P1-1 — Rule 41 kernel says `over-cap callers are SUSPENDED, not rejected` while shipped code returns a SkillResolution decision envelope; the actual Run.SUSPENDED transition is W2 orchestrator wiring."
    mechanism: "Active kernel uses end-state terms (`are SUSPENDED`, `consumes capacity`, `transitions to FAILED`) when only a decision envelope ships. Rule 96 alone cannot catch this — it checks for the literal `Rule N.<letter>` REFERENCE, not the semantic VERB."
    sweep_target: "Every #### Rule N kernel block in CLAUDE.md, cross-checked against ## Rule N.<letter> deferred sub-clauses in CLAUDE-deferred.md"
    sweep_result: "1 hit — Rule 41 (cited). No hidden drift in Rules 42, 45, 46, 47, or other deferred-aware kernels."
    closure:
      - "Narrowed Rule 41 kernel to: matrix MUST exist + runtime resolver MUST consult it + over-capacity MUST return SkillResolution.reject(SuspendReason.RateLimited). Actual Run/step suspension deferred to Rule 41.c."
      - "Added Rule 41.c sub-clause to docs/CLAUDE-deferred.md."
      - "NEW Rule 99 — kernel_terminal_verb_vs_shipped_decision_check + enforcer E139 + E140 + self-test fixtures + rule card."

  - family_id: "J-β"
    name: "Deleted-module-name leaks in operational Markdown + Rule 94 kernel-impl drift"
    cited_finding: "rc10 review P1-2 — ops/runbooks/README.md, dr.md, digest-pin.md, ops/compose/sidecar-mem0.yml still carried current-tense `agent-platform`/`agent-runtime` references; Rule 98 scope was ops/**/*.{yaml,yml,tpl} but NOT ops/**/*.md. Reviewer also noted Rule 94 kernel-vs-impl drift (kernel says 'every active .md/.yaml/.java' but impl scans 3 narrow surfaces)."
    mechanism: "Two compound issues: (a) Rule 98 scope gap; (b) Rule 94 kernel-impl drift surfaces hidden defects in active developer-facing docs (quickstart.md broken — names deleted module), posture-model.md, telemetry/policy.md, application.yml metric tag, BoM description, etc."
    sweep_target: "grep -rnE 'agent-platform|agent-runtime (not -core)' across active md/yaml/yml/java minus exemption list, classified by ±3-line marker check"
    sweep_result: "416 raw line-level hits → after marker-classification: 201 historical-marked (PASS) + 215 needing attention. Of the unmarked: ~180 in historical-by-location surfaces (docs/v6-rationale/, docs/delivery/, docs/plans/, docs/governance/architecture-graph.yaml, docs/governance/enforcers.yaml, rule cards about leakage rule) → added to Rule 94 widened exemption list. ~35 in active surfaces needed in-place fixes."
    closure:
      - "Fixed 4 cited rows: ops/runbooks/README.md:32, ops/runbooks/dr.md:11, ops/runbooks/digest-pin.md:31, ops/compose/sidecar-mem0.yml:7-8."
      - "Fixed ~30 hidden-defect surfaces: docs/quickstart.md (build commands referenced deleted modules — critical onboarding regression), docs/cross-cutting/posture-model.md, docs/cross-cutting/oss-bill-of-materials.md, docs/governance/posture-coverage.md, docs/telemetry/policy.md, docs/architecture-views/README.md, docs/cross-cutting/dev-environment.md, docs/governance/rule-history.md, agent-service/src/main/resources/application.yml metric tag, perf/baseline-2026-05-10.md, perf/README.md."
      - "Widened Rule 98 to scan ops/**/*.md + removed YAML comment exemption (so comments inside YAML files are now scanned)."
      - "Widened Rule 94 impl from 3 narrow surfaces to corpus-wide scan of every active .md/.yaml/.yml/.java minus expanded exemption list (build artefacts + historical-by-location + frozen-release exemption + Rule-98-domain + rule-cards-about-the-rule pattern)."

  - family_id: "J-γ"
    name: "Active rule kernel disagrees with shipped enforcer"
    cited_finding: "rc10 review P1-3 — Rule 96 kernel said 'the matching CLAUDE.md kernel block MUST contain' while the impl accepted EITHER the CLAUDE kernel OR the rule card. Code-as-Contract drift in the rule whose job is preventing kernel/deferred drift."
    mechanism: "kernel-AND vs impl-OR mismatch. Cards have no kernel_cap, so the broader 'either surface' policy was already implemented; kernel + card prose lagged behind."
    sweep_target: "Every active rule with multi-condition kernel; cross-check against impl predicate joins (&& vs ||)"
    sweep_result: "1 cited (Rule 96) + 3 OR-using kernels verified (Rules 48, 69, 95) — their impls match the OR semantics. Rule 96 is the only confirmed drift."
    closure:
      - "Rewrote Rule 96 kernel to 'EITHER the kernel block OR the rule card MUST contain the literal Rule N.<letter> reference'."
      - "Updated rule-96.md card + E133/E134 enforcer asserts to match (with explicit kernel-or-card truth table)."
      - "Added test_rule_96_card_only_pos fixture — proves the card-only path is intentional."
      - "NEW Rule 100 — kernel_implementation_disjunction_truth + enforcer E141 + E142 + self-test fixtures + rule card + gate/rule-100-disjunction-allowlist.txt (initial entry: Rule 96)."

  - family_id: "J-δ"
    name: "Shadow-corpus prose imprecision + retracted-tag qualification"
    cited_finding: "rc10 review P2-1 — rc10 release note prose said 'gate/rules/ regenerated by extract_rules.sh (110 files total)' but actual count is 108 (Rule 11 + Rule 28 each appear twice with sub-checks — gate/rules/ is keyed by unique rule id). gate/README.md:51 said '108 active rules' when canonical script has 110 sections."
    mechanism: "Prose conflates file count (unique rule id) with executable-section count. rc10 itself becomes a wider problem under user-elected retraction: every active rc10 reference must carry `(retracted)` qualifier per Rule 63."
    sweep_target: "Numeric drift in README/gate-README/architecture-status/release-notes/CLAUDE.md + rc10 tag references"
    sweep_result: "42 hits: 2 cited + ~10 historical-frozen (release notes pre-rc10) + ~30 rc10 references needing (retracted) qualifier"
    closure:
      - "Added v2.0.0-rc10 to docs/governance/retracted-tags.txt with retraction reason."
      - "Updated rc10 release note title to '(retracted)' + frontmatter retracted: true + retracted_by_tag: v2.0.0-rc11 + retracted_reason + prepended retraction banner above historical content."
      - "Updated gate/README.md:51 from '108 active rules' to '112 active executable sections / 110 unique rule ids (Rule 11 and Rule 28 each appear twice with sub-checks; rc11 reconciliation, ADR-0085)'."
      - "Updated Rule 92 kernel + card to clarify 'files are keyed by unique rule id'."
      - "Architecture-status.yaml allowed_claim narrative refreshed for rc11 wave."

decision: |
  All 4 cited findings ACCEPTED and closed via the J-α/β/γ/δ family taxonomy
  + sweep-then-batch-fix methodology. No rejections. User-elected scope
  additions: (a) rc10 full retraction (vs. carry-forward correction markers),
  (b) Rule 94 kernel-vs-impl widening (vs. defer to rc12 or narrow kernel).

  Concrete deliverables:

  - **NEW gate rules**: Rule 99 (kernel_terminal_verb_vs_shipped_decision_check),
    Rule 100 (kernel_implementation_disjunction_truth).
  - **Widened gate rules**: Rule 94 (scope: every active .md/.yaml/.yml/.java
    minus exemption list), Rule 98 (scope: + ops/**/*.md + YAML comment lines).
  - **Narrowed rule kernel**: Rule 41 (decision envelope only; transition
    deferred to Rule 41.c).
  - **Aligned rule kernel**: Rule 96 (EITHER kernel OR card — matches impl).
  - **Clarified rule kernel**: Rule 92 (gate/rules/ keyed by unique rule id;
    active_gate_checks counts executable sections).
  - **New deferred sub-clause**: Rule 41.c (Run/step suspension transition,
    W2 scheduler admission).
  - **New enforcer rows**: E139, E140, E141, E142.
  - **New rule cards**: docs/governance/rules/rule-99.md, rule-100.md.
  - **New allow-list**: gate/rule-100-disjunction-allowlist.txt (initial entry: Rule 96).
  - **Retraction**: v2.0.0-rc10 added to docs/governance/retracted-tags.txt;
    release-note title + frontmatter updated.
  - **Baseline refresh**: architecture-status.yaml#baseline_metrics +
    allowed_claim; README.md line 13 + 15; gate/README.md line 3 + 51.

consequences:
  positive:
    - "Reviewer's 4 findings fully closed at both the cited-surface and the family-sweep level."
    - "Rule 94 kernel-vs-impl drift (the reviewer's noted secondary issue) closed in the same wave per user election."
    - "Developer-facing onboarding doc (docs/quickstart.md) fixed — boot command for `agent-service` is now correct (was a hidden regression dating to Phase C consolidation)."
    - "Two new prevention rules (99, 100) catch the semantic-verb and kernel/impl-disjunction defect classes that Rules 96 and 94 don't reach."
    - "rc10 retraction provides cleaner audit trail than carry-forward correction markers."
  negative:
    - "Active_gate_checks count moved 110 → 112 (rc11 +2)."
    - "Two consecutive retractions in the v2.0.0 release line (w2x-final, rc10) may concern downstream consumers; however both retractions are documented with explicit reason chains in docs/governance/retracted-tags.txt."
    - "Rule 94 widened scan is slower than narrow scan; serial gate run time increases ~10-20% on Linux (still well under 30min ceiling)."
  neutral:
    - "Rule 41 kernel narrowing is cosmetic — no shipped behaviour changed; the contract surface and tests are unchanged."

alternatives_considered:
  - alternative: "Carry rc11-correction markers on the rc10 release note prose (don't retract rc10)."
    why_rejected: "User explicitly elected full retraction. Cleaner audit trail; future reviewers don't have to mentally apply correction markers."
  - alternative: "Defer Rule 94 widening to rc12 (focus rc11 on cited findings only)."
    why_rejected: "User explicitly elected to fix in rc11. Same-wave closure prevents the kernel-vs-impl drift from accreting more hidden defects between waves."
  - alternative: "Narrow Rule 94 kernel to match the 3-surface impl (the rc10 reviewer noted this as one option)."
    why_rejected: "Loses the more comprehensive coverage Rule 94 promises. Widening the impl matches the kernel without scope reduction."
  - alternative: "Widen Rule 96 to also check kernel semantic verbs (instead of adding Rule 99)."
    why_rejected: "Conflates two cleanly separable invariants (literal reference presence vs. semantic verb correctness). Separate rules keep each one debuggable."

verification:
