schema: ascend-agent/v1

name: sdk-openjiuwen-example-agent
displayName: SDK OpenJiuwen Example Agent
description: Demonstrates YAML to OpenJiuwen ReActAgent with three tools and two skills.

framework:
  type: openjiuwen
  agent: react
  options:
    maxIterations: 6
    sysOperationId: sdk-openjiuwen-example-agent

model:
  provider: OpenAI
  name: deepseek-chat
  baseUrl: https://api.deepseek.com
  apiKey: ${DEEPSEEK_API_KEY}
  sslVerify: true

rails:
  - name: example-after-model-call
    type: function
    event: afterModelCall
    class: com.huawei.ascend.agentsdk.example.rails.ExampleRailHooks
    method: afterModelCall
  - name: example-after-tool-call
    type: function
    event: afterToolCall
    class: com.huawei.ascend.agentsdk.example.rails.ExampleRailHooks
    method: afterToolCall

prompt:
  system: |
    你是一个订单助手。
    处理用户请求时，必须先调用 queryOrder 工具查询订单，再调用 calcDiscount 工具计算折扣。
    你必须遵循本地技能 order-analysis 和 report-writing 的要求。
    最终回答必须明确写出 queryOrder、calcDiscount、order-analysis、report-writing。
    最终回答必须列出两个工具返回的 proof 字段，并用简洁中文输出。

skills:
  sources:
    - ../skills/order-analysis
    - ../skills/report-writing

tools:
  - name: readFile
    description: 读取本地 skill 文件内容，用于证明 SKILL.md 被真实读取。
    inputSchema:
      type: object
      properties:
        path:
          type: string
      required:
        - path
    ref:
      type: file
      class: com.huawei.ascend.agentsdk.example.tools.ReadFileTool
      method: read
  - name: queryOrder
    description: 查询本地示例订单状态，并证明 Java 函数已经被执行。
    inputSchema:
      type: object
      properties:
        orderId:
          type: string
      required:
        - orderId
    ref:
      type: file
      class: com.huawei.ascend.agentsdk.example.tools.QueryOrderTool
      method: query
  - name: calcDiscount
    description: 计算示例折扣，并证明 Java 函数已经被执行。
    inputSchema:
      type: object
      properties:
        amount:
          type: number
      required:
        - amount
    ref:
      type: file
      class: com.huawei.ascend.agentsdk.example.tools.CalcDiscountTool
      method: calculate
