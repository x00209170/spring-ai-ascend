# RAGFlow alternate full-stack RAG platform compose overlay.
# Activate with: docker compose -f ops/compose/sidecar-ragflow.yml up -d
#
# Version tag tracks third_party/MANIFEST.md Section B RAGFlow entry
# (v0.25.2 / SHA 57b24be; 80k+ stars; Apache-2.0).
#
# RAGFlow is NOT wired into any spring-ai-ascend SDK adapter. Consumers
# integrate via RAGFlow's own REST API if they choose this platform.
# This overlay is provided for evaluation convenience only.
#
# RAGFlow UI available at: http://localhost:8040

services:
  ragflow:
    image: infiniflow/ragflow:v0.25.2
    container_name: spring-ai-ascend-ragflow
    ports:
      - "8040:80"
      - "9380:9380"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    volumes:
      - ragflow-data:/ragflow/logs
      - ragflow-docs:/ragflow/docs
    networks:
      - spring-ai-ascend
    restart: unless-stopped

volumes:
  ragflow-data:
  ragflow-docs:

networks:
  spring-ai-ascend:
    name: spring-ai-ascend
    external: true
