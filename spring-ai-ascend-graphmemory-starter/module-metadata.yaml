# Module metadata for spring-ai-ascend-graphmemory-starter.
# Required by CLAUDE.md Rule 31 (Independent Module Evolution).
# Authority: ADR-0066. Enforced by gate rule module_metadata_present_and_complete.

module: spring-ai-ascend-graphmemory-starter
kind: starter            # platform | domain | starter | bom | sample
version: 0.1.0-SNAPSHOT
semver_compatibility: 0.x
description: "Spring Boot starter that wires the GraphMemoryRepository SPI to a Graphiti REST adapter at W1 (per ADR-0034). Auto-config disabled at W0."
architecture_doc: null    # minimal starter; agent-service owns the SPI architecture surface
dfx_doc: docs/dfx/spring-ai-ascend-graphmemory-starter.yaml
spi_packages: []          # starter consumes runtime SPI; declares no SPI of its own
allowed_dependencies:
  - agent-service          # SPI consumer (post-Phase-C consolidation per ADR-0078)
forbidden_dependencies: []
deployment_plane: bus_state   # Rule 39 / P-I — graph memory persistence belongs on the Bus & State Hub plane (Postgres + Graphiti)
